<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Surprise!</title>
    <style>
        body {
            text-align: center;
            font-family: 'Zeyada', cursive;
            background-color: #ffcccb;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        h1 {
            font-size: 50px;
            animation: bounce 2s infinite;
        }
        .message {
            font-size: 24px;
            margin: 20px;
        }
        .btn {
            padding: 15px 30px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #ff1493;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <h1>🎊 Surprise! 🎊</h1>
    <p class="message">Hope your day is filled with joy, laughter, and endless love! 💖 Miss you soo much nannaa, can't wait to see you and spend time together</p>
    <button class="btn" onclick="window.location.href='https://www.example.com'">Surprise</button>
    <button class="btn" onclick="window.location.href='index.html'">Birthday Page 🎂</button>
    <audio autoplay>
        <source src="audio/songfinal.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
</body>
</html>
